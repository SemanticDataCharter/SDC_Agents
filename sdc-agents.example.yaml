# SDC Agents Configuration
# Copy to sdc-agents.yaml and fill in values.
# Environment variables can be used with ${VAR_NAME} syntax.

sdcstudio:
  base_url: "https://sdcstudio.example.com"
  api_key: "${SDC_API_KEY}"          # VaaS token (Validation Agent only)
  toolbox_url: "http://localhost:5000"  # MCP Toolbox server (optional)
  default_library_project: "SDC4-Core"  # Default project for contextual components

cache:
  root: ".sdc-cache"
  ttl_hours: 24

audit:
  path: ".sdc-cache/audit.jsonl"
  log_level: "standard"  # "standard" summarizes outputs; "verbose" logs full payloads

datasources:
  lab_db:
    type: "sql"
    connection_string: "${LAB_DB_CONNECTION}"
  patient_csv:
    type: "csv"
    path: "/data/exports/patients.csv"
  records_json:
    type: "json"
    path: "/data/exports/records.json"
    jsonpath: "$.results[*]"
  clinical_db:
    type: "mongodb"
    connection_string: "${MONGO_CONNECTION}"
    database: "clinical"
    collection: "lab_results"

  # --- BigQuery (pip install sdc-agents[bigquery]) ---
  # Uses Application Default Credentials (ADC) — no connection_string needed.
  analytics_bq:
    type: "bigquery"
    project: "my-gcp-project"
    dataset: "clinical_data"

  # --- Cloud data platforms (pip install the driver, then use type: sql) ---
  # Snowflake:  pip install snowflake-sqlalchemy
  snowflake_warehouse:
    type: "sql"
    connection_string: "snowflake://${SNOWFLAKE_USER}:${SNOWFLAKE_PASSWORD}@${SNOWFLAKE_ACCOUNT}/${SNOWFLAKE_DATABASE}/${SNOWFLAKE_SCHEMA}?warehouse=${SNOWFLAKE_WAREHOUSE}"
  # Databricks:  pip install databricks-sql-connector sqlalchemy-databricks
  databricks_warehouse:
    type: "sql"
    connection_string: "databricks://token:${DATABRICKS_TOKEN}@${DATABRICKS_HOST}:443/${DATABRICKS_CATALOG}.${DATABRICKS_SCHEMA}?http_path=${DATABRICKS_HTTP_PATH}"

# Knowledge sources — customer contextual resources (pip install sdc-agents[knowledge])
knowledge:
  vector_store: "chroma"
  vector_store_path: ".sdc-cache/knowledge/"
  sources:
    data_dictionary:
      type: "markdown"
      path: "/data/docs/data_dictionary.md"
    glossary:
      type: "json"
      path: "/data/docs/glossary.json"
    domain_ontology:
      type: "ttl"
      path: "/data/ontologies/domain.ttl"
    policy_manual:
      type: "pdf"
      path: "./docs/data_governance_policy.pdf"
    requirements_doc:
      type: "docx"
      path: "./docs/requirements.docx"

# Vertex AI Search — semantic discovery (ADK-native, no MCP export)
# Requires: pip install sdc-agents[vertex-ai-search]
# Requires: GCP Application Default Credentials
vertex_ai_search:
  enabled: false
  data_store_id: "projects/${GCP_PROJECT}/locations/global/collections/default_collection/dataStores/${VAS_DATA_STORE}"
  max_results: 10

output:
  directory: "./output"
  formats:
    - "xml"

destinations:
  triplestore:
    type: "fuseki"
    endpoint: "${FUSEKI_URL}"
    auth: "${FUSEKI_AUTH}"
    upload_method: "named_graph"
  graph_database:
    type: "neo4j"
    endpoint: "${NEO4J_URL}"
    auth: "${NEO4J_AUTH}"
    database: "sdc4"
  document_store:
    type: "rest_api"
    endpoint: "${DATA_API_URL}"
    method: "POST"
    headers:
      Authorization: "Bearer ${DATA_API_TOKEN}"
      Content-Type: "application/json"
  archive:
    type: "filesystem"
    path: "./archive/{ct_id}/{instance_id}/"
    create_directories: true
